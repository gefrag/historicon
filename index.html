<!doctype html>
<html lang="el">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Historicon Podcast Stats</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5efe6;
        --ink: #172026;
        --muted: #63717a;
        --line: #ded2c1;
        --panel: #fffaf2;
        --panel-strong: #ffffff;
        --accent: #b5472f;
        --accent-dark: #733322;
        --gold: #c1842d;
        --blue: #346b73;
        --green: #607a3d;
        --shadow: 0 18px 46px rgba(23, 32, 38, 0.11);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          linear-gradient(135deg, rgba(181, 71, 47, 0.11), transparent 34%),
          linear-gradient(315deg, rgba(52, 107, 115, 0.12), transparent 35%),
          var(--bg);
      }

      a {
        color: inherit;
      }

      button,
      input,
      select {
        font: inherit;
      }

      .shell {
        width: min(1220px, calc(100% - 32px));
        margin: 0 auto;
        padding: 34px 0 56px;
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1.35fr) minmax(280px, 0.65fr);
        gap: 24px;
        align-items: stretch;
        margin-bottom: 24px;
      }

      .hero-copy,
      .feature-panel,
      .stat-card,
      .chart-panel,
      .controls,
      .episode-card,
      .loading,
      .error {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 250, 242, 0.9);
        box-shadow: var(--shadow);
      }

      .hero-copy {
        padding: clamp(28px, 5vw, 56px);
      }

      .eyebrow {
        margin: 0 0 12px;
        color: var(--accent-dark);
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      h1 {
        max-width: 780px;
        margin-bottom: 18px;
        font-size: clamp(2.25rem, 6vw, 5.4rem);
        line-height: 0.96;
        letter-spacing: 0;
      }

      .lede {
        max-width: 700px;
        margin-bottom: 28px;
        color: var(--muted);
        font-size: clamp(1rem, 2vw, 1.24rem);
      }

      .hero-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        min-height: 34px;
        padding: 6px 12px;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--accent-dark);
        background: #fff;
        font-size: 0.92rem;
        font-weight: 700;
      }

      .feature-panel {
        display: flex;
        flex-direction: column;
        min-height: 100%;
        overflow: hidden;
      }

      .cover-wrap {
        position: relative;
        min-height: 260px;
        background: #e9dece;
      }

      .cover-wrap img {
        display: block;
        width: 100%;
        height: 100%;
        min-height: 260px;
        object-fit: cover;
      }

      .feature-body {
        padding: 22px;
      }

      .feature-body h2 {
        margin-bottom: 8px;
        font-size: 1.35rem;
      }

      .feature-body p {
        margin-bottom: 18px;
        color: var(--muted);
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 40px;
        padding: 8px 14px;
        border: 0;
        border-radius: 6px;
        color: #fff;
        background: var(--accent);
        font-weight: 800;
        text-decoration: none;
      }

      .button.secondary {
        color: var(--accent-dark);
        background: #f2e4d4;
      }

      .section-title {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 16px;
        margin: 34px 0 14px;
      }

      .section-title h2 {
        margin: 0;
        font-size: clamp(1.45rem, 3vw, 2rem);
      }

      .section-title span {
        color: var(--muted);
        font-weight: 700;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 14px;
      }

      .stat-card {
        padding: 20px;
        background: var(--panel-strong);
      }

      .stat-label {
        color: var(--muted);
        font-size: 0.84rem;
        font-weight: 800;
        text-transform: uppercase;
      }

      .stat-value {
        margin-top: 8px;
        font-size: clamp(1.75rem, 4vw, 2.8rem);
        line-height: 1;
        font-weight: 900;
      }

      .stat-note {
        margin-top: 8px;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .insights {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      .chart-panel {
        padding: 22px;
        background: var(--panel-strong);
      }

      .chart-panel h3 {
        margin-bottom: 18px;
        font-size: 1.1rem;
      }

      .chart-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 18px;
      }

      .chart-head h3 {
        margin: 0;
      }

      .segmented {
        display: inline-flex;
        padding: 3px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: #f7efe4;
      }

      .segment {
        min-height: 30px;
        border: 0;
        border-radius: 5px;
        padding: 5px 9px;
        color: var(--muted);
        background: transparent;
        cursor: pointer;
        font-size: 0.82rem;
        font-weight: 900;
      }

      .segment.is-active {
        color: var(--accent-dark);
        background: #fff;
        box-shadow: 0 1px 4px rgba(23, 32, 38, 0.08);
      }

      .bars {
        display: grid;
        gap: 12px;
      }

      .bar-row {
        display: grid;
        grid-template-columns: 62px minmax(0, 1fr) 48px;
        gap: 12px;
        align-items: center;
      }

      .bar-label,
      .bar-value {
        color: var(--muted);
        font-size: 0.92rem;
        font-weight: 800;
      }

      .bar-button {
        width: 100%;
        border: 0;
        padding: 0;
        color: inherit;
        background: transparent;
        text-align: left;
        cursor: pointer;
      }

      .bar-track {
        height: 12px;
        overflow: hidden;
        border: 0;
        border-radius: 999px;
        background: #eee3d4;
      }

      .bar-fill {
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--accent), var(--gold));
        transition:
          filter 160ms ease,
          transform 160ms ease;
      }

      .bar-row:hover .bar-fill,
      .bar-row:focus-within .bar-fill,
      .bar-row.is-active .bar-fill {
        filter: saturate(1.35);
        transform: scaleX(1.01);
        transform-origin: left center;
      }

      .bar-row.is-active .bar-label,
      .bar-row.is-active .bar-value {
        color: var(--accent-dark);
      }

      .timeline {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(72px, 1fr));
        gap: 10px;
        align-items: end;
        min-height: 180px;
      }

      .timeline.is-all {
        grid-template-columns: repeat(auto-fit, minmax(56px, 1fr));
      }

      .month {
        display: flex;
        flex-direction: column;
        justify-content: end;
        min-height: 160px;
        gap: 8px;
        border: 0;
        padding: 0;
        color: inherit;
        background: transparent;
        cursor: pointer;
      }

      .month-column {
        min-height: 12px;
        border-radius: 6px 6px 2px 2px;
        background: linear-gradient(180deg, var(--blue), var(--green));
        transition:
          filter 160ms ease,
          transform 160ms ease;
      }

      .month-label {
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 800;
        text-align: center;
      }

      .month-count {
        display: block;
        margin-top: 2px;
        color: var(--ink);
        font-size: 0.86rem;
        font-weight: 900;
      }

      .month:hover .month-column,
      .month:focus-visible .month-column,
      .month.is-active .month-column {
        filter: saturate(1.35);
        transform: translateY(-2px);
      }

      .month.is-active .month-label,
      .month.is-active .month-count {
        color: var(--accent-dark);
      }

      .controls {
        display: grid;
        grid-template-columns: minmax(220px, 1fr) 170px 180px;
        gap: 12px;
        padding: 14px;
        margin-bottom: 16px;
        background: var(--panel-strong);
      }

      .active-filter {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin: -2px 0 16px;
        color: var(--muted);
        font-weight: 800;
      }

      .clear-filter {
        min-height: 34px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 6px 10px;
        color: var(--accent-dark);
        background: #fff;
        cursor: pointer;
        font-weight: 800;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      .field label {
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 900;
        text-transform: uppercase;
      }

      .field input,
      .field select {
        width: 100%;
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 8px 10px;
        color: var(--ink);
        background: #fff;
      }

      .episodes {
        display: grid;
        gap: 14px;
      }

      .episode-card {
        display: grid;
        grid-template-columns: 112px minmax(0, 1fr);
        gap: 18px;
        padding: 14px;
        background: var(--panel-strong);
      }

      .episode-card img {
        width: 112px;
        height: 112px;
        border-radius: 6px;
        object-fit: cover;
        background: #e9dece;
      }

      .episode-main {
        min-width: 0;
      }

      .episode-top {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 6px;
      }

      .episode-card h3 {
        margin: 0;
        font-size: 1.12rem;
        line-height: 1.25;
      }

      .episode-date {
        flex: 0 0 auto;
        color: var(--muted);
        font-size: 0.92rem;
        font-weight: 800;
      }

      .description {
        display: -webkit-box;
        margin-bottom: 12px;
        overflow: hidden;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        color: var(--muted);
      }

      .episode-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      .spotify-player {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 12px;
        margin-bottom: 16px;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-strong);
        box-shadow: var(--shadow);
      }

      .player-title {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .player-title strong {
        min-width: 0;
      }

      .spotify-player iframe {
        width: 100%;
        height: 152px;
        border: 0;
        border-radius: 8px;
      }

      .play-full {
        border: 0;
        cursor: pointer;
      }

      .loading,
      .error {
        padding: 28px;
        color: var(--muted);
        background: var(--panel-strong);
      }

      .hidden {
        display: none;
      }

      @media (max-width: 880px) {
        .hero,
        .insights {
          grid-template-columns: 1fr;
        }

        .stats-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .chart-head {
          align-items: flex-start;
          flex-direction: column;
        }

        .controls {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 560px) {
        .shell {
          width: min(100% - 20px, 1220px);
          padding-top: 18px;
        }

        .hero-copy,
        .feature-body,
        .chart-panel {
          padding: 18px;
        }

        .stats-grid,
        .episode-card {
          grid-template-columns: 1fr;
        }

        .episode-card img {
          width: 100%;
          height: auto;
          aspect-ratio: 1;
        }

        .episode-top {
          display: grid;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section id="loading" class="loading">Loading podcast archive...</section>
      <section id="error" class="error hidden"></section>

      <div id="app" class="hidden">
        <section class="hero">
          <div class="hero-copy">
            <p class="eyebrow">Spotify archive dashboard</p>
            <h1>Historicon episode map</h1>
            <p class="lede">
              A visual overview of the full podcast archive: release rhythm,
              listening time, standout episodes, and a searchable episode list.
            </p>
            <div id="heroMeta" class="hero-meta"></div>
          </div>

          <aside id="latestEpisode" class="feature-panel"></aside>
        </section>

        <section aria-labelledby="stats-title">
          <div class="section-title">
            <h2 id="stats-title">Archive Stats</h2>
            <span id="updatedRange"></span>
          </div>
          <div id="statsGrid" class="stats-grid"></div>
        </section>

        <section class="insights" aria-label="Podcast insights">
          <div class="chart-panel">
            <h3>Episodes by year</h3>
            <div id="yearBars" class="bars"></div>
          </div>
          <div class="chart-panel">
            <div class="chart-head">
              <h3>Release rhythm by month</h3>
              <div class="segmented" aria-label="Month chart range">
                <button id="recentMonths" class="segment is-active" type="button">
                  Last 12
                </button>
                <button id="allMonths" class="segment" type="button">
                  All months
                </button>
              </div>
            </div>
            <div id="monthChart" class="timeline"></div>
          </div>
        </section>

        <section aria-labelledby="episodes-title">
          <div class="section-title">
            <h2 id="episodes-title">Episodes</h2>
            <span id="episodeCount"></span>
          </div>

          <div class="controls">
            <div class="field">
              <label for="search">Search</label>
              <input id="search" type="search" placeholder="Title or description">
            </div>
            <div class="field">
              <label for="yearFilter">Year</label>
              <select id="yearFilter"></select>
            </div>
            <div class="field">
              <label for="sortOrder">Sort</label>
              <select id="sortOrder">
                <option value="newest">Newest first</option>
                <option value="oldest">Oldest first</option>
                <option value="longest">Longest first</option>
                <option value="shortest">Shortest first</option>
              </select>
            </div>
          </div>
          <div id="activeFilter" class="active-filter hidden"></div>
          <div id="spotifyPlayer" class="spotify-player"></div>

          <div id="episodes" class="episodes"></div>
        </section>
      </div>
    </main>

    <script>
      const state = {
        episodes: [],
        filtered: [],
        monthFilter: null,
        monthRange: "recent",
        currentEpisode: null,
      };

      const formatDate = new Intl.DateTimeFormat("en-GB", {
        day: "2-digit",
        month: "short",
        year: "numeric",
      });

      const monthFormat = new Intl.DateTimeFormat("en-GB", {
        month: "short",
        year: "2-digit",
      });

      const weekdayFormat = new Intl.DateTimeFormat("en-GB", {
        weekday: "long",
      });

      const text = (value) => String(value || "").trim();

      function escapeHtml(value) {
        return text(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function cleanDescription(value) {
        return text(value)
          .replace(/\s+/g, " ")
          .replace(/https?:\/\/\S+/g, "")
          .trim();
      }

      function durationParts(ms) {
        const minutes = Math.round(ms / 60000);
        return {
          hours: Math.floor(minutes / 60),
          minutes: minutes % 60,
          totalMinutes: minutes,
        };
      }

      function formatDuration(ms) {
        const duration = durationParts(ms);
        if (duration.hours === 0) {
          return `${duration.minutes}m`;
        }
        return `${duration.hours}h ${duration.minutes}m`;
      }

      function groupBy(items, getKey) {
        return items.reduce((groups, item) => {
          const key = getKey(item);
          groups.set(key, (groups.get(key) || 0) + 1);
          return groups;
        }, new Map());
      }

      function getImage(episode) {
        return episode.images?.[0]?.url || "";
      }

      function getSpotifyUrl(episode) {
        return episode.external_urls?.spotify || "#";
      }

      function getSpotifyEmbedUrl(episode) {
        return `https://open.spotify.com/embed/episode/${encodeURIComponent(episode.id)}?utm_source=generator`;
      }

      function getEpisodeNumber(name) {
        const match = text(name).match(/^(\d+)/);
        return match ? Number(match[1]) : null;
      }

      function normalizeEpisode(episode) {
        const date = new Date(`${episode.release_date}T00:00:00`);
        return {
          ...episode,
          date,
          year: date.getFullYear(),
          monthKey: `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}`,
          descriptionText: cleanDescription(episode.description),
          episodeNumber: getEpisodeNumber(episode.name),
        };
      }

      function scrollToEpisodes() {
        document.getElementById("episodes-title").scrollIntoView({
          behavior: "smooth",
          block: "start",
        });
      }

      function filterByYear(year) {
        state.monthFilter = null;
        document.getElementById("yearFilter").value = String(year);
        renderYearBars(state.episodes);
        renderMonthChart(state.episodes);
        renderEpisodes();
        scrollToEpisodes();
      }

      function filterByMonth(monthKey) {
        state.monthFilter = monthKey;
        document.getElementById("yearFilter").value = monthKey.slice(0, 4);
        renderYearBars(state.episodes);
        renderMonthChart(state.episodes);
        renderEpisodes();
        scrollToEpisodes();
      }

      function clearChartFilter() {
        state.monthFilter = null;
        document.getElementById("yearFilter").value = "all";
        renderYearBars(state.episodes);
        renderMonthChart(state.episodes);
        renderEpisodes();
      }

      function renderSpotifyPlayer(episode) {
        state.currentEpisode = episode;
        document.getElementById("spotifyPlayer").innerHTML = `
          <div class="player-title">
            <strong>${escapeHtml(episode.name)}</strong>
            <span class="pill">${formatDuration(episode.duration_ms)}</span>
          </div>
          <iframe
            title="Spotify player for ${escapeHtml(episode.name)}"
            src="${escapeHtml(getSpotifyEmbedUrl(episode))}"
            loading="lazy"
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
          ></iframe>
        `;
      }

      function playFullEpisode(episodeId) {
        const episode = state.episodes.find((item) => item.id === episodeId);
        if (!episode) return;
        renderSpotifyPlayer(episode);
        document.getElementById("spotifyPlayer").scrollIntoView({
          behavior: "smooth",
          block: "center",
        });
      }

      function renderHero(episodes) {
        const latest = episodes[0];
        const oldest = episodes[episodes.length - 1];
        const totalHours = Math.round(
          episodes.reduce((sum, episode) => sum + episode.duration_ms, 0) / 3600000,
        );
        const image = getImage(latest);

        document.getElementById("heroMeta").innerHTML = [
          `${episodes.length} episodes`,
          `${totalHours} listening hours`,
          `${formatDate.format(oldest.date)} - ${formatDate.format(latest.date)}`,
        ]
          .map((item) => `<span class="pill">${item}</span>`)
          .join("");

        document.getElementById("latestEpisode").innerHTML = `
          <div class="cover-wrap">
            ${image ? `<img src="${escapeHtml(image)}" alt="">` : ""}
          </div>
          <div class="feature-body">
            <p class="eyebrow">Latest episode</p>
            <h2>${escapeHtml(latest.name)}</h2>
            <p>${formatDate.format(latest.date)} · ${formatDuration(latest.duration_ms)}</p>
            <a class="button" href="${escapeHtml(getSpotifyUrl(latest))}" target="_blank" rel="noreferrer">
              Play on Spotify
            </a>
          </div>
        `;
      }

      function renderStats(episodes) {
        const totalMs = episodes.reduce((sum, episode) => sum + episode.duration_ms, 0);
        const averageMs = totalMs / episodes.length;
        const longest = episodes.reduce((best, episode) =>
          episode.duration_ms > best.duration_ms ? episode : best,
        );
        const shortest = episodes.reduce((best, episode) =>
          episode.duration_ms < best.duration_ms ? episode : best,
        );
        const weekdayCounts = groupBy(episodes, (episode) =>
          weekdayFormat.format(episode.date),
        );
        const topWeekday = [...weekdayCounts.entries()].sort((a, b) => b[1] - a[1])[0];

        const cards = [
          {
            label: "Total episodes",
            value: episodes.length,
            note: "Downloaded from Spotify",
          },
          {
            label: "Total listening time",
            value: `${Math.round(totalMs / 3600000)}h`,
            note: "Full archive runtime",
          },
          {
            label: "Average episode",
            value: formatDuration(averageMs),
            note: "Typical listen length",
          },
          {
            label: "Top release day",
            value: topWeekday[0],
            note: `${topWeekday[1]} releases`,
          },
          {
            label: "Longest episode",
            value: formatDuration(longest.duration_ms),
            note: longest.name,
          },
          {
            label: "Shortest episode",
            value: formatDuration(shortest.duration_ms),
            note: shortest.name,
          },
          {
            label: "First release",
            value: formatDate.format(episodes[episodes.length - 1].date),
            note: episodes[episodes.length - 1].name,
          },
          {
            label: "Latest release",
            value: formatDate.format(episodes[0].date),
            note: episodes[0].name,
          },
        ];

        document.getElementById("statsGrid").innerHTML = cards
          .map(
            (card) => `
              <article class="stat-card">
                <div class="stat-label">${card.label}</div>
                <div class="stat-value">${card.value}</div>
                <div class="stat-note">${escapeHtml(card.note)}</div>
              </article>
            `,
          )
          .join("");

        document.getElementById("updatedRange").textContent =
          `${formatDate.format(episodes[episodes.length - 1].date)} to ${formatDate.format(episodes[0].date)}`;
      }

      function renderYearBars(episodes) {
        const counts = [...groupBy(episodes, (episode) => episode.year).entries()]
          .sort((a, b) => Number(a[0]) - Number(b[0]));
        const max = Math.max(...counts.map(([, count]) => count));

        document.getElementById("yearBars").innerHTML = counts
          .map(
            ([year, count]) => `
              <button class="bar-row bar-button ${String(year) === document.getElementById("yearFilter").value && !state.monthFilter ? "is-active" : ""}" type="button" data-year="${year}" aria-label="Show ${count} episodes from ${year}">
                <div class="bar-label">${year}</div>
                <div class="bar-track">
                  <div class="bar-fill" style="width: ${(count / max) * 100}%"></div>
                </div>
                <div class="bar-value">${count}</div>
              </button>
            `,
          )
          .join("");

        document.querySelectorAll("#yearBars [data-year]").forEach((button) => {
          button.addEventListener("click", () => filterByYear(button.dataset.year));
        });
      }

      function renderMonthChart(episodes) {
        const counts = [...groupBy(episodes, (episode) => episode.monthKey).entries()]
          .sort((a, b) => a[0].localeCompare(b[0]));
        const max = Math.max(...counts.map(([, count]) => count));
        const visibleMonths =
          state.monthRange === "all" ? counts : counts.slice(-12);
        const monthChart = document.getElementById("monthChart");

        monthChart.classList.toggle("is-all", state.monthRange === "all");
        monthChart.innerHTML = visibleMonths
          .map(([monthKey, count]) => {
            const date = new Date(`${monthKey}-01T00:00:00`);
            return `
              <button class="month ${state.monthFilter === monthKey ? "is-active" : ""}" type="button" data-month="${monthKey}" title="${count} episodes" aria-label="Show ${count} episodes from ${monthFormat.format(date)}">
                <div class="month-column" style="height: ${Math.max(10, (count / max) * 142)}px"></div>
                <div class="month-label">
                  ${monthFormat.format(date)}
                  <span class="month-count">${count}</span>
                </div>
              </button>
            `;
          })
          .join("");

        document.querySelectorAll("#monthChart [data-month]").forEach((button) => {
          button.addEventListener("click", () => filterByMonth(button.dataset.month));
        });
      }

      function renderYearFilter(episodes) {
        const years = [...new Set(episodes.map((episode) => episode.year))].sort(
          (a, b) => b - a,
        );
        document.getElementById("yearFilter").innerHTML = [
          '<option value="all">All years</option>',
          ...years.map((year) => `<option value="${year}">${year}</option>`),
        ].join("");
      }

      function renderEpisodes() {
        const search = document.getElementById("search").value.toLocaleLowerCase();
        const year = document.getElementById("yearFilter").value;
        const sort = document.getElementById("sortOrder").value;

        let episodes = state.episodes.filter((episode) => {
          const matchesSearch =
            !search ||
            episode.name.toLocaleLowerCase().includes(search) ||
            episode.descriptionText.toLocaleLowerCase().includes(search);
          const matchesYear = year === "all" || String(episode.year) === year;
          const matchesMonth =
            !state.monthFilter || episode.monthKey === state.monthFilter;
          return matchesSearch && matchesYear && matchesMonth;
        });

        episodes = [...episodes].sort((a, b) => {
          if (sort === "oldest") return a.date - b.date;
          if (sort === "longest") return b.duration_ms - a.duration_ms;
          if (sort === "shortest") return a.duration_ms - b.duration_ms;
          return b.date - a.date;
        });

        state.filtered = episodes;
        document.getElementById("episodeCount").textContent =
          `${episodes.length} shown`;
        renderActiveFilter();

        document.getElementById("episodes").innerHTML = episodes
          .map((episode) => {
            const image = getImage(episode);
            return `
              <article class="episode-card">
                ${image ? `<img src="${escapeHtml(image)}" alt="">` : "<div></div>"}
                <div class="episode-main">
                  <div class="episode-top">
                    <h3>${escapeHtml(episode.name)}</h3>
                    <div class="episode-date">${formatDate.format(episode.date)}</div>
                  </div>
                  <div class="description">${escapeHtml(episode.descriptionText || "No description available.")}</div>
                  <div class="episode-actions">
                    <span class="pill">${formatDuration(episode.duration_ms)}</span>
                    <button class="button play-full" type="button" data-episode-id="${escapeHtml(episode.id)}">
                      Play full episode
                    </button>
                    <a class="button secondary" href="${escapeHtml(getSpotifyUrl(episode))}" target="_blank" rel="noreferrer">
                      Open Spotify
                    </a>
                  </div>
                </div>
              </article>
            `;
          })
          .join("");

        document.querySelectorAll("[data-episode-id]").forEach((button) => {
          button.addEventListener("click", () => {
            playFullEpisode(button.dataset.episodeId);
          });
        });
      }

      function bindControls() {
        document.getElementById("search").addEventListener("input", renderEpisodes);
        document.getElementById("yearFilter").addEventListener("change", () => {
          state.monthFilter = null;
          renderYearBars(state.episodes);
          renderMonthChart(state.episodes);
          renderEpisodes();
        });
        document.getElementById("sortOrder").addEventListener("change", renderEpisodes);
        document.getElementById("recentMonths").addEventListener("click", () => {
          setMonthRange("recent");
        });
        document.getElementById("allMonths").addEventListener("click", () => {
          setMonthRange("all");
        });
      }

      function setMonthRange(range) {
        state.monthRange = range;
        document
          .getElementById("recentMonths")
          .classList.toggle("is-active", range === "recent");
        document
          .getElementById("allMonths")
          .classList.toggle("is-active", range === "all");
        renderMonthChart(state.episodes);
      }

      function renderActiveFilter() {
        const activeFilter = document.getElementById("activeFilter");
        if (!state.monthFilter) {
          activeFilter.classList.add("hidden");
          activeFilter.innerHTML = "";
          return;
        }

        const date = new Date(`${state.monthFilter}-01T00:00:00`);
        activeFilter.classList.remove("hidden");
        activeFilter.innerHTML = `
          <span>Showing episodes from ${monthFormat.format(date)}</span>
          <button class="clear-filter" type="button">Clear chart filter</button>
        `;
        activeFilter
          .querySelector(".clear-filter")
          .addEventListener("click", clearChartFilter);
      }

      async function loadEpisodes() {
        try {
          const response = await fetch("all_episodes.json");
          if (!response.ok) {
            throw new Error(`Could not load all_episodes.json (${response.status})`);
          }

          const payload = await response.json();
          state.episodes = payload.items
            .map(normalizeEpisode)
            .sort((a, b) => b.date - a.date);

          renderHero(state.episodes);
          renderStats(state.episodes);
          renderYearBars(state.episodes);
          renderMonthChart(state.episodes);
          renderYearFilter(state.episodes);
          bindControls();
          renderSpotifyPlayer(state.episodes[0]);
          renderEpisodes();

          document.getElementById("loading").classList.add("hidden");
          document.getElementById("app").classList.remove("hidden");
        } catch (error) {
          document.getElementById("loading").classList.add("hidden");
          const errorBox = document.getElementById("error");
          errorBox.classList.remove("hidden");
          errorBox.innerHTML = `
            <strong>Could not load the podcast data.</strong>
            <p>
              Serve this folder with a local web server so the browser can fetch
              <code>all_episodes.json</code>. For example:
              <code>python -m http.server 8000</code>
            </p>
          `;
          console.error(error);
        }
      }

      loadEpisodes();
    </script>
  </body>
</html>
